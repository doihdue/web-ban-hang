<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản trị - Cài đặt trang</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/admin-menu.css}" />
</head>
<body>
    <div th:replace="admin/fragments/menu :: adminMenu"></div>

    <div class="main-content">
        <div th:replace="~{fragments/header :: header}"></div>
        <div class="container mt-4">
            <h2>Cài đặt trang</h2>

            <!-- Quick link to Home Sections editor -->
            <div class="mb-3">
                <a class="btn btn-outline-primary" th:href="@{/admin/home-sections}">Chỉnh sửa mục trang chủ (3 khối)</a>
            </div>

            <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

            <form th:action="@{/admin/settings}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                <div class="mb-3">
                    <label class="form-label">Nội dung Giới thiệu (HTML)</label>
                    <textarea class="form-control" name="aboutHtml" rows="8" th:text="${settingsMap['aboutHtml']}"></textarea>
                </div>

                <div class="mb-3">
                    <label class="form-label">Nội dung Chính sách giao hàng (HTML)</label>
                    <textarea class="form-control" name="shippingPolicyHtml" rows="8" th:text="${settingsMap['shippingPolicyHtml']}"></textarea>
                </div>

                <div class="mb-3">
                    <label class="form-label">Banner HTML (tuỳ chọn)</label>
                    <textarea class="form-control" name="bannerHtml" rows="3" th:text="${settingsMap['bannerHtml']}"></textarea>
                </div>

                <div class="mb-3">
                    <label class="form-label">Số điện thoại liên hệ</label>
                    <input class="form-control" name="contactPhone" th:value="${settingsMap['contactPhone']}"/>
                </div>

                <div class="mb-3">
                    <label class="form-label">Email liên hệ</label>
                    <input class="form-control" name="contactEmail" th:value="${settingsMap['contactEmail']}"/>
                </div>

                <div class="mb-3">
                    <label class="form-label">Link bản đồ (iframe HTML)</label>
                    <textarea class="form-control" name="mapEmbedHtml" rows="3" th:text="${settingsMap['mapEmbedHtml']}"></textarea>
                </div>

                <hr>

                <h5 class="mb-3">Cài đặt thanh toán</h5>

                <div class="mb-3">
                    <label class="form-label">Tên ngân hàng</label>
                    <input class="form-control" name="paymentBankName" th:value="${settingsMap['paymentBankName']}"/>
                </div>

                <div class="mb-3">
                    <label class="form-label">Số tài khoản</label>
                    <input class="form-control" name="paymentAccountNumber" th:value="${settingsMap['paymentAccountNumber']}"/>
                </div>

                <div class="mb-3">
                    <label class="form-label">Tên chủ tài khoản</label>
                    <input class="form-control" name="paymentAccountName" th:value="${settingsMap['paymentAccountName']}"/>
                </div>

                <div class="mb-3">
                    <label class="form-label">Mã QR (URL ảnh)</label>
                    <input class="form-control" name="paymentQrCodeUrl" th:value="${settingsMap['paymentQrCodeUrl']}"/>
                </div>

                <button class="btn btn-primary" type="submit">Lưu</button>
            </form>
        </div>
        <div th:replace="~{fragments/footer :: footer}"></div>
    </div>
</body>
</html>
