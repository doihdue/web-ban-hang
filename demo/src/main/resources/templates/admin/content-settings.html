<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Admin - Nội dung website</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" th:href="@{/css/admin-menu.css}" />
</head>
<body>
    <div th:replace="admin/fragments/menu :: adminMenu"></div>

    <div class="main-content">
      <div class="container py-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <h1 class="h3 mb-0"><i class="fas fa-file-alt me-2"></i>Nội dung trang</h1>
          <a th:href="@{/admin/dashboard}" class="btn btn-outline-secondary">Quay lại Dashboard</a>
        </div>

        <div th:if="${success}" class="alert alert-success">Đã lưu nội dung thành công.</div>

        <form th:action="@{/admin/content-settings/save}" method="post">
          <div class="card mb-4">
            <div class="card-header">Nội dung Giới thiệu (HTML)</div>
            <div class="card-body">
              <textarea name="aboutHtml" class="form-control" rows="10" th:text="${settingsMap['aboutHtml']}"></textarea>
            </div>
          </div>

          <div class="card mb-4">
            <div class="card-header">Nội dung Chính sách giao hàng (HTML)</div>
            <div class="card-body">
              <textarea name="shippingPolicyHtml" class="form-control" rows="12" th:text="${settingsMap['shippingPolicyHtml']}"></textarea>
            </div>
          </div>

          <div>
            <button type="submit" class="btn btn-primary"><i class="fas fa-save me-2"></i>Lưu</button>
          </div>
        </form>

      </div>
    </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
