<!-- Thymeleaf fragment containing shared admin mobile navbar and sidebar -->
<div th:fragment="adminMenu">
    <!-- Mobile navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark navbar-mobile">
        <div class="container-fluid">
<!--            <a class="navbar-brand" href="#">Quản Trị Hệ Thống</a>-->
            <!-- Toggler now only controls the sidebar (no Bootstrap collapse) -->
            <button id="adminSidebarToggler" class="navbar-toggler" type="button" data-sidebar-toggle="true" aria-label="Toggle navigation" aria-expanded="false" aria-controls="adminSidebar" role="button">
                <span class="navbar-toggler-icon"></span>
            </button>
            <!-- Keep a small right-side area (logout) to the navbar on mobile -->
            <div class="navbar-mobile-actions ms-auto d-flex align-items-center">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/LoginUser}"><i class="fas fa-sign-out-alt"></i> Đăng Xuất</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Sidebar -->
    <div class="sidebar" id="adminSidebar">
        <div class="d-flex flex-column p-3">
            <a href="#" class="d-flex align-items-center mb-3 mb-md-0 me-md-auto text-white text-decoration-none">
                <i class="fas fa-store-alt fs-4 me-2"></i>
                <span class="fs-4">Quản Trị Hệ Thống</span>
            </a>
            <hr>
            <ul class="nav nav-pills flex-column mb-auto sidebar-nav">
                <li class="nav-item">
                    <a th:href="@{/admin/dashboard}" class="nav-link" th:classappend="${activeMenu == 'dashboard' ? ' active' : ''}">
                        <i class="fas fa-tachometer-alt"></i> Tổng Quan
                    </a>
                </li>
                <li class="nav-item">
                    <a th:href="@{/admin-product}" class="nav-link" th:classappend="${activeMenu == 'products' ? ' active' : ''}">
                        <i class="fas fa-box"></i> Sản Phẩm
                    </a>
                </li>
                <li class="nav-item">
                    <a th:href="@{/admin/categories}" class="nav-link" th:classappend="${activeMenu == 'categories' ? ' active' : ''}">
                        <i class="fas fa-tags"></i> Danh Mục
                    </a>
                </li>
                <li class="nav-item">
                    <a th:href="@{/admin/home-sections}" class="nav-link" th:classappend="${activeMenu == 'homeSections' ? ' active' : ''}">
                        <i class="fas fa-th-large"></i> Mục Trang Chủ
                    </a>
                </li>
                <li class="nav-item">
                    <a th:href="@{/orders}" class="nav-link" th:classappend="${activeMenu == 'orders' ? ' active' : ''}">
                        <i class="fas fa-shopping-cart"></i> Đơn Hàng
                    </a>
                </li>
                <li class="nav-item">
                    <a th:href="@{/customers}" class="nav-link" th:classappend="${activeMenu == 'customers' ? ' active' : ''}">
                        <i class="fas fa-users"></i> Khách Hàng
                    </a>
                </li>
                <li class="nav-item"><a th:href="@{/admin/settings}" class="nav-link" th:classappend="${activeMenu == 'settings' ? ' active' : ''}"><i class="fas fa-cog"></i> Cài Đặt</a></li>
            </ul>
            <hr>
            <a th:href="@{/logout}" class="nav-link text-white">
                <i class="fas fa-sign-out-alt"></i> Đăng Xuất
            </a>
        </div>
    </div>

    <!-- Backdrop element (real DOM node so clicks register reliably) -->
    <div id="adminSidebarBackdrop" class="sidebar-backdrop" aria-hidden="true"></div>

    <script th:src="@{/js/admin-menu.js}"></script>
</div>
